<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Abarrotes</title>
<style>
    body {
        background: linear-gradient(#fff5f5, #fdf0f0);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 20px;
        color: #333;
    }

    .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 10px;
    }

    h1 {
        background: linear-gradient(135deg, #c1121f, #9d0208);
        color: white;
        text-align: center;
        padding: 28px 20px;
        margin: 0 0 35px 0;
        border-radius: 14px;
        box-shadow: 0 8px 25px rgba(193, 18, 31, 0.35);
        font-size: 2.4em;
        letter-spacing: 1.5px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    h2 {
        color: #c1121f;
        border-bottom: 4px solid #c1121f;
        padding-bottom: 10px;
        margin-top: 35px;
        margin-bottom: 15px;
        font-size: 1.5em;
        font-weight: 700;
    }

    form {
        background: white;
        padding: 28px;
        border-radius: 14px;
        border: 2.5px solid #e63946;
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        max-width: 520px;
        margin-bottom: 25px;
    }

    label {
        font-weight: 700;
        color: #9d0208;
        display: block;
        margin-bottom: 4px;
    }

    input[type="text"],
    input[type="number"] {
        width: 100%;
        padding: 11px 14px;
        border: 2px solid #e63946;
        border-radius: 8px;
        font-size: 1.05em;
        margin-top: 3px;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: #c1121f;
        box-shadow: 0 0 0 4px rgba(193, 18, 31, 0.2);
        background: #fffafafa;
    }

    button {
        background: linear-gradient(#c1121f, #9d0208);
        color: white;
        border: none;
        padding: 13px 26px;
        font-size: 1.05em;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(193, 18, 31, 0.35);
        margin-top: 10px;
    }

    button:hover {
        background: linear-gradient(#9d0208, #7b0206);
        transform: translateY(-3px);
        box-shadow: 0 6px 16px rgba(193, 18, 31, 0.45);
    }

    button:active {
        transform: translateY(0);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        margin: 18px 0;
    }

    th {
        background: #c1121f;
        color: white;
        padding: 15px 12px;
        text-align: left;
        font-weight: 700;
        font-size: 1.02em;
    }

    td {
        padding: 13px 12px;
        border-bottom: 1px solid #f0d0d0;
        vertical-align: middle;
    }

    tr:nth-child(even) {
        background: #fff8f8;
    }

    tr:hover {
        background: #ffecec;
    }

    hr {
        border: none;
        height: 3px;
        background: linear-gradient(to right, transparent, #e63946, transparent);
        margin: 35px 0;
        border-radius: 2px;
    }

    #totalVentas {
        color: #c1121f;
        font-weight: 800;
        font-size: 1.6em;
    }

    .acciones button {
        padding: 6px 14px;
        font-size: 0.9em;
        margin: 2px;
    }
</style>
</head>

<body>

<div class="container">

<h1>Sistema de Abarrotes</h1>

<h2>Registro de Ventas</h2>

<form id="formVenta">

<label>Número:</label><br>
<input type="text" id="vnumero" required><br><br>

<label>Código de Barras:</label><br>
<input type="text" id="vcodigo" required><br><br>

<label>Producto:</label><br>
<input type="text" id="vproducto" required><br><br>

<label>Precio:</label><br>
<input type="number" id="vprecio" required><br><br>

<label>Cantidad:</label><br>
<input type="number" id="vcantidad" required><br><br>

<button type="submit">Guardar Venta</button>

</form>

<hr>

<h2>Ventas Registradas</h2>

<table border="1" id="tablaVentas">
<thead>
<tr>
<th>Número</th>
<th>Código</th>
<th>Producto</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Subtotal</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

<h2>Total de Ventas: $<span id="totalVentas">0</span></h2>

<hr>

<h2>Inventario</h2>

<form id="formProducto">
    <label>Número:</label><br>
    <input type="text" id="numero" required><br><br>

    <label>Código de Barras:</label><br>
    <input type="text" id="codigo" required><br><br>

    <label>Producto:</label><br>
    <input type="text" id="producto" required><br><br>

    <label>Precio:</label><br>
    <input type="number" id="precio" required><br><br>

    <label>Cantidad:</label><br>
    <input type="number" id="cantidad" required><br><br>

    <button type="submit">Guardar Producto</button>
</form>

<hr>

<h2>Productos Registrados</h2>

<table border="1" id="tablaProductos">
    <thead>
        <tr>
            <th>Número</th>
            <th>Código</th>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

</div>

<script>

// VENTAS

let filaVentaEditar = null;

document.getElementById("formVenta").addEventListener("submit", function(e){

    e.preventDefault();

    let numero = document.getElementById("vnumero").value;
    let codigo = document.getElementById("vcodigo").value;
    let producto = document.getElementById("vproducto").value;
    let precio = parseFloat(document.getElementById("vprecio").value);
    let cantidad = parseInt(document.getElementById("vcantidad").value);

    let subtotal = precio * cantidad;

    if(filaVentaEditar === null){

        let tabla = document.getElementById("tablaVentas").getElementsByTagName("tbody")[0];

        let fila = tabla.insertRow();

        fila.insertCell(0).innerHTML = numero;
        fila.insertCell(1).innerHTML = codigo;
        fila.insertCell(2).innerHTML = producto;
        fila.insertCell(3).innerHTML = precio;
        fila.insertCell(4).innerHTML = cantidad;
        fila.insertCell(5).innerHTML = subtotal;

        let acciones = fila.insertCell(6);

        acciones.innerHTML =
        '<button onclick="editarVenta(this)">Modificar</button> ' +
        '<button onclick="eliminarVenta(this)">Eliminar</button>';

    }else{

        filaVentaEditar.cells[0].innerHTML = numero;
        filaVentaEditar.cells[1].innerHTML = codigo;
        filaVentaEditar.cells[2].innerHTML = producto;
        filaVentaEditar.cells[3].innerHTML = precio;
        filaVentaEditar.cells[4].innerHTML = cantidad;
        filaVentaEditar.cells[5].innerHTML = subtotal;

        filaVentaEditar = null;
    }

    actualizarTotal();

    document.getElementById("formVenta").reset();

});

function eliminarVenta(btn){

    let fila = btn.parentNode.parentNode;
    fila.remove();

    actualizarTotal();
}

function editarVenta(btn){

    filaVentaEditar = btn.parentNode.parentNode;

    document.getElementById("vnumero").value = filaVentaEditar.cells[0].innerHTML;
    document.getElementById("vcodigo").value = filaVentaEditar.cells[1].innerHTML;
    document.getElementById("vproducto").value = filaVentaEditar.cells[2].innerHTML;
    document.getElementById("vprecio").value = filaVentaEditar.cells[3].innerHTML;
    document.getElementById("vcantidad").value = filaVentaEditar.cells[4].innerHTML;
}

function actualizarTotal(){

    let tabla = document.getElementById("tablaVentas").getElementsByTagName("tbody")[0];

    let total = 0;

    for(let i = 0; i < tabla.rows.length; i++){

        total += parseFloat(tabla.rows[i].cells[5].innerHTML);
    }

    document.getElementById("totalVentas").innerHTML = total;
}

// INVENTARIO

let filaEditar = null;

document.getElementById("formProducto").addEventListener("submit", function(e){

    e.preventDefault();

    let numero = document.getElementById("numero").value;
    let codigo = document.getElementById("codigo").value;
    let producto = document.getElementById("producto").value;
    let precio = document.getElementById("precio").value;
    let cantidad = document.getElementById("cantidad").value;

    if(filaEditar === null){

        let tabla = document.getElementById("tablaProductos").getElementsByTagName('tbody')[0];

        let fila = tabla.insertRow();

        fila.insertCell(0).innerHTML = numero;
        fila.insertCell(1).innerHTML = codigo;
        fila.insertCell(2).innerHTML = producto;
        fila.insertCell(3).innerHTML = precio;
        fila.insertCell(4).innerHTML = cantidad;

        let acciones = fila.insertCell(5);

        acciones.innerHTML =
        '<button onclick="editar(this)">Modificar</button> ' +
        '<button onclick="eliminar(this)">Eliminar</button>';

    }else{

        filaEditar.cells[0].innerHTML = numero;
        filaEditar.cells[1].innerHTML = codigo;
        filaEditar.cells[2].innerHTML = producto;
        filaEditar.cells[3].innerHTML = precio;
        filaEditar.cells[4].innerHTML = cantidad;

        filaEditar = null;
    }

    document.getElementById("formProducto").reset();

});

function eliminar(btn){
    let fila = btn.parentNode.parentNode;
    fila.remove();
}

function editar(btn){

    filaEditar = btn.parentNode.parentNode;

    document.getElementById("numero").value = filaEditar.cells[0].innerHTML;
    document.getElementById("codigo").value = filaEditar.cells[1].innerHTML;
    document.getElementById("producto").value = filaEditar.cells[2].innerHTML;
    document.getElementById("precio").value = filaEditar.cells[3].innerHTML;
    document.getElementById("cantidad").value = filaEditar.cells[4].innerHTML;
}

</script>

</body>
</html>
